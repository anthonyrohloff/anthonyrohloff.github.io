---
layout: default
title: Home
---

<h2>Posts</h2>

<div class="filter-buttons">
  <button onclick="filterPosts('all')">All</button>
  <button onclick="filterPosts('ctf-writeups')">CTF Write-ups</button>
  <button onclick="filterPosts('vulnerability-research')">Vulnerability Research</button>
  <button onclick="filterPosts('blog')">Blog</button>
</div>

<ul id="post-list">
  {% for post in site.posts %}
    <li class="post-item" data-categories="{{ post.categories | join: ' ' }}">
      <a href="{{ post.url }}">{{ post.title }}</a>
      <small>{{ post.date | date: "%B %d, %Y" }}</small>
      {% for category in post.categories %}
        <span class="category-tag">{{ category }}</span>
      {% endfor %}
    </li>
  {% endfor %}
</ul>

<script>
function filterPosts(category) {
  const items = document.querySelectorAll('.post-item');
  items.forEach(item => {
    if (category === 'all' || item.dataset.categories.includes(category)) {
      item.style.display = 'block';
    } else {
      item.style.display = 'none';
    }
  });
}
</script>
