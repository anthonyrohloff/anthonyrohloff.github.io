---
layout: default
---

<h1>{{ page.title }}</h1>
<p>
  <small>{{ page.date | date: "%B %d, %Y" }}</small>
  {% if page.categories %}
    &nbsp;|&nbsp;
    {% for category in page.categories %}
      <span class="category-tag">{{ category }}</span>
    {% endfor %}
  {% endif %}
</p>

{{ content }}
